<!DOCTYPE html>

<head>

    <title>お勧めの個人店</title>
</head>
<body>

    <header>
        <h1>お勧めの個人店</h1>

    <!-- リンクを横一列に表示するコンテナ -->
    <div class="links-container">
            <!-- ホームページへのリンク -->
        <p><a href="https://example.com" class="btn-square">ホームページへ</a></p>
        <!-- 他のサイトへのリンク -->
        <p><a href="https://www.example.com" class="btn-square">チェーン店へ</a></p>
        <!-- 他のサイトへのリンク -->
        <p><a href="https://www.example.com" class="btn-square">居酒屋へ</a></p>
    </div>

    <section class="restaurant" id="restaurant1">
        <img src="./店の写真/店.jpeg" alt="寿司画像"width="650" height="400">
        場所は<a href="https://www.google.co.jp/maps/place/%E9%85%92%E5%87%A6%E3%81%8D%E3%81%BF/@35.684176,140.0215791,17z/data=!3m1!4b1!4m6!3m5!1s0x6022802eb4159253:0x89b0870356e333ec!8m2!3d35.684176!4d140.024154!16s%2Fg%2F1tkjl9s_?entry=ttu">こちら</a>
        <h2>酒処きみ</h2> <!-- h1からh6の要素はトップレベルの見出しに使うため、ここではh2を使用 -->
        <p>住所: 千葉県習志野市津田沼 3-1-6</p>
        <p>営業時間: 11:00 - 20:00</p>
        <p>定休日: 火曜日</p>
        <p>価格帯: 500円〜1000円</p>
    </section>

    <div class="slideshow-container">
        <img src="./店の写真/定食.jpeg" alt="寿司画像"width="300" height="200">
    </div>

    <section class="restaurant" id="restaurant2">
        <h2>特徴</h2>
        <!-- その他のコンテンツ -->
    </section>
    
    <div class="slideshow-container">
        <!-- 画像を追加 -->
        <img src="images/food.jpg" alt="フード画像">
    </div>

    <!-- 他のお店の情報も同様に追加 -->

        &copy; 2023 お手頃ご飯やさん紹介サイト
    </footer>

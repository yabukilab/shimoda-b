<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PM実験</title>
    <style type ="text/css">
        h1 {
            font-size: 30px;
            background-color: #e7ebe3;
            color: #000000;
            padding: 8px 14px;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            text-align: right;
        }

        p {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        .links-container {
            display: flex;
            justify-content: center; /* 中央寄せ */
            flex-wrap: wrap; /* ボタンが横並びになりすぎないように折り返す */
            gap: 10px; /* ボタン間の余白 */
        }

        .btn-square {
            font-size: 12px;
            flex: 1; /* ボタンの伸縮可能な割合を1に設定 */
            max-width: 150px; /* ボタンの最大幅を設定 */
            padding: 10px 20px;
            text-decoration: none;
            background: #0a0a0a;
            color: #FFF;
            border-bottom: solid 4px #4a4f5a;
            border-radius: 3px;
            margin-bottom: 20px; /* ボタン間の余白 */
            cursor: pointer;
            text-align: center;
            line-height: 30px;
        }

        .btn-square:active {
            transform: translateY(4px);
            border-bottom: none;
        }

        .image-container {
            max-width: 100%;
            height: auto;
            overflow: hidden;
        }

        .image-container img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<h1>津田沼のとにかく安いご飯</h1>
<h2>実験用</h2>

<p>突然ですが、津田沼の安くて美味しいお店を知っていますか？</p>
<p>「飲食店で1000円出すのはちょっと高いかな～」や、「居酒屋で2000円するの!」なんて思ったことはありませんか？</p>
<p>そんな、お金がなくて困っている皆さんに津田沼で食べられるとにかく安い個人店、チェーン店、居酒屋の3つに分けて紹介します！</p>
<div class="image-container">
    <img src="店の写真/津田沼1.jpg" alt="店の写真">
</div>
　

<div class="links-container">
    <a href="個人店.html" class="btn-square">個人店へ</a>
    <a href="チェーン店.html" class="btn-square">チェーン店へ</a>
    <a href="居酒屋.html" class="btn-square">居酒屋へ</a>
</div>

<p>お好みの場所は見つかりましたか？新しいお店を開拓して津田沼を楽しみつくしましょう！</p>
</body>
</html>

            <h2>津田沼のお店紹介</h2>
            <figure>
                <img src="img/IMG_4966.jpg" alt="丸善 津田沼店" style="max-width: 100%";>
                <figcaption>
                <div id="center">
                丸善 津田沼店
                </div>
                <br>JR津田沼駅南口から徒歩3分というアクセスの良さと坪数1000坪という広大な関東最大級の広さがうれしい大型書店です。
                    広々とした店内には、新刊から専門書、参考書まで幅広いジャンルの書籍を取り揃えています。また、高品質な文房具や雑貨も充実しており、
                    プレゼント選びにも最適です。地元津田沼に特化したコーナーもあり、地域の文化が感じられる工夫がされています。
                
                    <br><br>店舗情報<br>
                    <br>所在地 千葉県習志野市谷津7-7-1 Loharu津田沼 B棟 2~3F<br>
                    <br>アクセス 津田沼駅南口から徒歩3分、駐車場有<br>
                    <br>営業時間 平日 : 10:00~21:00
                            土日祝 : 10:00~20:00
                            水曜不定休(月1回)<br>
                    <br>お問い合わせ TEL: 03-6367-6185<br>
                </figcaption>
            </figure>
            <br><br><br><br>
            <figure>
                <img src="img/IMG_4967.jpg" alt="こってりラーメン なりたけ" style="max-width: 100%; height: auto;">
                <figcaption>
                <div id="center">
                    こってりラーメン なりたけ
                </div>
                <br>津田沼エリアで人気の濃厚背脂ラーメン専門店です。創業以来、こだわり抜いた濃厚なスープともちもちの中太麺が多くのファンを魅了しています。たっぷりと浮かぶ背脂が特徴で、旨味とコクのあるスープは一度食べたら忘れられない味わいです。トッピングの種類も豊富で、自分好みの一杯をカスタマイズできます。特に人気の「チャーシュー麺」はボリューム満点で食べ応え抜群です。
                    たっぷりと浮かぶ背油が特徴で、旨味とコクのあるスープは一度食べたら忘れられない味わいです。トッピングの種類も豊富で、自分好みの一杯の
                    カスタマイズもできます。

                    <br><br>店舗情報<br>

                    <br>営業時間 11:00~翌3:00 水曜日定休<br>
                    <br>お問い合わせ 047-477-7987<br>

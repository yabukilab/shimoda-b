<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼 買い物施設選びチャート</title>
    <link rel="stylesheet" href="m.c.styles.css">
</head>
<body>
    <header>
        <h1>津田沼 買い物施設選びチャート</h1>
        <p>あなたにぴったりの買い物施設を見つけましょう！</p>
    </header>

    <div class="chart-container">
        <div class="node">買い物に行きますか？</div>
        <div class="arrow">↓</div>

        <div class="decision">
            <div class="yes-no">
                <div class="node">はい</div>
                <div class="node">いいえ</div>
            </div>
        </div>

        <div class="arrow">↓</div>

        <div class="node">どのタイプの買い物がしたいですか？</div>
        <div class="arrow">↓</div>

        <div class="decision">
            <div class="yes-no">
                <div class="node">ファッション</div>
                <div class="node">雑貨</div>
                <div class="node">食品</div>
            </div>
        </div>

        <div class="arrow">↓</div>

        <div class="node">ファッションなら...</div>
        <div class="arrow">↓</div>
        <div class="node">モリシア津田沼</div>
        <div class="arrow">→</div>
        <div class="node">多彩なファッションブランドがあります。</div>
        <div class="arrow"></div>
        <div class="node">イオンモール津田沼</div>
        <div class="arrow">→</div>
        <div class="node">豊富なセレクトショップがあります。</div>

        <div class="arrow"></div>
        <div class="node">雑貨なら...</div>
        <div class="arrow">↓</div>
        <div class="node">ミーナ津田沼</div>
        <div class="arrow">→</div>
        <div class="node">ユニークな雑貨が揃っています。</div>
        <div class="arrow"></div>
        <div class="node">津田沼ビート</div>
        <div class="arrow">→</div>
        <div class="node">アートや手作り雑貨があります。</div>

        <div class="arrow"></div>
        <div class="node">食品なら...</div>
        <div class="arrow">↓</div>
        <div class="node">Loharu津田沼</div>
        <div class="arrow">→</div>
        <div class="node">新鮮な食材やスイーツが豊富です。</div>
    </div>

    <footer>
        <p>&copy; 2024 津田沼 買い物施設選びチャート</p>
    </footer>
</body>
</html>
